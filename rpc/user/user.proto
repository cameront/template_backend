// follow https://github.com/twitchtv/twirp/blob/main/docs/best_practices.md

syntax = "proto3";

// package <organization>.<repo>[.<service>];
package user;

option go_package = "rpc/user";

service User {
  rpc WhoAmI(Empty) returns (Identity);
  rpc Logout(Empty) returns (Empty);
  rpc GetValue(CounterRequest) returns (CounterValue);
  rpc Increment(IncrementRequest) returns (CounterValue);
}

message Empty {}

message Identity {
  string username = 1;
  bool is_admin = 2;
}

message CounterRequest {
  string name = 1;
}

message IncrementRequest {
  string name = 1;
  int64 amount = 2;
}

message CounterValue {
  string name = 1;
  int64 value = 2;
}
